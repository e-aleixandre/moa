name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.12

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            pkg/serve/frontend/package-lock.json
            pkg/serve/frontend-next/package-lock.json

      - name: Build frontend
        working-directory: pkg/serve/frontend
        run: |
          npm ci
          npm run build

      - name: Build frontend-next
        working-directory: pkg/serve/frontend-next
        run: |
          npm ci
          npm run build

      - name: Build
        run: go build ./...
        env:
          GOFLAGS: -mod=readonly

      - name: Check go.sum tidy
        run: |
          go mod tidy
          git diff --exit-code go.sum

      - name: Test
        run: go test -race -count=1 ./...

      - name: Check Go vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Audit production frontend dependencies
        working-directory: pkg/serve/frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Audit production frontend-next dependencies
        working-directory: pkg/serve/frontend-next
        run: npm audit --omit=dev --audit-level=high

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: 1.25.12

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            pkg/serve/frontend/package-lock.json
            pkg/serve/frontend-next/package-lock.json

      - name: Build frontend
        working-directory: pkg/serve/frontend
        run: |
          npm ci
          npm run build

      - name: Build frontend-next
        working-directory: pkg/serve/frontend-next
        run: |
          npm ci
          npm run build

      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
