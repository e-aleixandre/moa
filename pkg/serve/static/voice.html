<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>moa voice (prototype)</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 15px/1.5 system-ui, -apple-system, sans-serif;
    background: #0d1117; color: #e6edf3; padding: 16px; max-width: 720px; margin: 0 auto;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .sub { color: #8b949e; font-size: 13px; margin: 0 0 16px; }
  button {
    font: inherit; padding: 10px 14px; border-radius: 10px; border: 1px solid #30363d;
    background: #161b22; color: #e6edf3; cursor: pointer;
  }
  button.primary { background: #238636; border-color: #2ea043; font-weight: 600; }
  button.danger { background: #b62324; border-color: #da3633; }
  button:disabled { opacity: .5; cursor: default; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #6e7681; display: inline-block; }
  .dot.live { background: #2ea043; box-shadow: 0 0 8px #2ea043; }
  .dot.speaking { background: #d29922; box-shadow: 0 0 8px #d29922; }
  #active { color: #8b949e; font-size: 13px; margin: 0 0 12px; }
  #active b { color: #e6edf3; }
  #log {
    background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 10px;
    height: 52vh; overflow-y: auto; font-size: 13px; white-space: pre-wrap; word-break: break-word;
  }
  .le { padding: 3px 0; border-bottom: 1px solid #21262d; }
  .le .t { color: #6e7681; font-size: 11px; }
  .le.bridge { color: #58a6ff; }
  .le.tool { color: #d29922; }
  .le.agent { color: #7ee787; }
  .le.err { color: #ff7b72; }
  .le.you { color: #e6edf3; }
  .banner { background: #3d1d00; border: 1px solid #d29922; color: #ffd; padding: 10px; border-radius: 10px; margin-bottom: 12px; }
</style>
</head>
<body>
<h1>moa voice <span style="color:#8b949e;font-weight:400">— prototype</span></h1>
<p class="sub">Throwaway bench. Audio goes browser↔OpenAI direct; the model manages all your sessions.</p>

<div id="unavailable" class="banner" style="display:none">
  Realtime voice isn't available: no OpenAI API key on this <code>moa serve</code>.
  Add an <code>openai</code> API key (or <code>openai-transcribe</code>) to the auth store.
</div>

<div class="row">
  <button id="connect" class="primary">🎙️ Start voice</button>
  <button id="disconnect" class="danger" disabled>Stop</button>
  <button id="mute" disabled>Mute mic</button>
  <span class="dot" id="dot"></span>
  <span id="status" class="sub" style="margin:0">idle</span>
</div>

<div class="row" style="margin-bottom:8px">
  <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:#8b949e;cursor:pointer">
    <input type="checkbox" id="bargein" /> Barge-in (interrupt while it speaks — use with headphones; off avoids echo on speakers)
  </label>
</div>

<div id="active">active session: <b>—</b></div>

<div id="log"></div>


<script type="module">
const $ = (id) => document.getElementById(id);
const logEl = $('log');
function log(kind, msg) {
  const div = document.createElement('div');
  div.className = 'le ' + kind;
  const t = new Date().toLocaleTimeString();
  div.innerHTML = `<span class="t">${t}</span> ${escapeHtml(msg)}`;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}
function escapeHtml(s) { return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function setStatus(s) { $('status').textContent = s; }

const HDRS = { 'Content-Type': 'application/json', 'X-Moa-Request': '1' };
async function api(method, path, body) {
  const opts = { method, headers: HDRS, credentials: 'same-origin' };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`${r.status}: ${(await r.text()).slice(0,200)}`);
  if (r.status === 204) return null;
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

// ---------------------------------------------------------------------------
// State — one live snapshot per moa session. The bridge tracks ALL sessions;
// the model picks which one is "active" for commands.
// ---------------------------------------------------------------------------
let pc = null, dc = null, micTrack = null;
let dcReady = false, userMuted = false, modelSpeaking = false;
let bargeIn = localStorage.getItem('moa_voice_bargein') === '1';

const sessions = new Map(); // id -> snapshot
let activeId = null;

function titleOf(id) { const s = sessions.get(id); return s ? (s.title || '(untitled)') : id; }
function activeSess() { return activeId ? sessions.get(activeId) : null; }

function setActive(id, announce) {
  if (!sessions.get(id)) return false;
  activeId = id;
  $('active').innerHTML = 'active session: <b>' + escapeHtml(titleOf(id)) + '</b>';
  updateTools();
  if (announce) log('bridge', 'active session → ' + titleOf(id));
  return true;
}

// ---------------------------------------------------------------------------
// Load sessions + open a bus feed for each
// ---------------------------------------------------------------------------
async function loadSessions() {
  const caps = await api('GET', '/api/capabilities').catch(() => ({}));
  if (!caps.realtime) { $('unavailable').style.display = 'block'; $('connect').disabled = true; }
  const list = await api('GET', '/api/sessions').catch(() => []);
  for (const s of (list || []).filter(s => !s.archived)) {
    if (!sessions.has(s.id)) {
      sessions.set(s.id, {
        id: s.id, title: s.title, state: s.state, lastAgentText: '',
        history: [], toolActivity: {}, pendingAsk: null, pendingPerm: null, subagentsActive: 0, ws: null,
      });
    } else {
      sessions.get(s.id).title = s.title;
    }
  }
  if (!activeId && sessions.size) setActive([...sessions.keys()][0], false);
}

function connectAllBuses() { for (const s of sessions.values()) connectBus(s.id); }

function connectBus(id) {
  const s = sessions.get(id);
  if (!s || s.ws) return;
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${proto}//${location.host}/api/sessions/${id}/ws`);
  s.ws = ws;
  ws.onmessage = (e) => handleBusEvent(id, JSON.parse(e.data));
  ws.onclose = () => { if (s.ws === ws) s.ws = null; };
}

function closeAllBuses() {
  for (const s of sessions.values()) { if (s.ws) { const w = s.ws; s.ws = null; w.close(); } }
}

// ---------------------------------------------------------------------------
// Bridge: moa bus -> realtime briefing
// ---------------------------------------------------------------------------
function briefModel(text, askResponse = true) {
  if (!dcReady) return;
  log('bridge', '→ ' + text);
  dc.send(JSON.stringify({
    type: 'conversation.item.create',
    item: { type: 'message', role: 'user',
      content: [{ type: 'input_text', text: `[MOA EVENT] ${text}` }] },
  }));
  if (askResponse) dc.send(JSON.stringify({ type: 'response.create' }));
}

function toolSummary(s) {
  const parts = Object.entries(s.toolActivity).map(([k, v]) => `${k}×${v}`);
  return parts.length ? parts.join(', ') : 'none';
}

// Prefix that names the conversation when it is NOT the active one, so the
// model can offer to switch.
function where(id) {
  if (id === activeId) return 'In the current session';
  return `In another session "${titleOf(id)}"`;
}

function handleBusEvent(id, evt) {
  const s = sessions.get(id);
  if (!s) return;
  const d = evt.data || {};
  switch (evt.type) {
    case 'init':
      s.state = d.state || 'idle';
      // init carries the full history + pending state (snake_case JSON).
      s.history = Array.isArray(d.messages) ? d.messages : [];
      if (d.pending_permission) s.pendingPerm = { id: d.pending_permission.id, toolName: d.pending_permission.tool_name, args: d.pending_permission.args };
      if (d.pending_ask) s.pendingAsk = { id: d.pending_ask.id, questions: d.pending_ask.questions || [] };
      s.subagentsActive = (d.subagents || []).length;
      if (id === activeId) updateTools();
      return;

    // lossy: ignore
    case 'text_delta': case 'thinking_delta':
    case 'tool_update': case 'tool_call_delta':
      return;

    // aggregate, stay silent
    case 'tool_start': {
      const n = d.tool_name || 'tool';
      s.toolActivity[n] = (s.toolActivity[n] || 0) + 1;
      return;
    }
    case 'message_end':
      if (d.text) {
        s.lastAgentText = d.text;
        // Keep history growing live so "catch me up" works mid-session.
        s.history.push({ role: 'assistant', content: [{ type: 'text', text: d.text }] });
      }
      return;

    case 'state_change':
      s.state = d.state;
      if (d.state === 'error') briefModel(`${where(id)}: the agent hit an error: ${d.error || 'unknown'}.`);
      return;

    case 'ask_user':
      s.pendingAsk = { id: d.id, questions: d.questions || [] };
      if (id === activeId) updateTools();
      briefModel(`${where(id)}: the agent is asking you: ${(d.questions||[]).map(q => q.question).join(' / ')}`);
      return;

    case 'permission_request':
      s.pendingPerm = { id: d.id, toolName: d.tool_name, args: d.args };
      if (id === activeId) updateTools();
      briefModel(`${where(id)}: the agent wants permission to run ${d.tool_name}: ${shortArgs(d.args)}. Approve?`);
      return;

    case 'ask_resolved': s.pendingAsk = null; if (id === activeId) updateTools(); return;
    case 'permission_resolved': s.pendingPerm = null; if (id === activeId) updateTools(); return;

    case 'run_end': {
      const tools = toolSummary(s);
      const txt = s.lastAgentText ? summarize(s.lastAgentText) : 'done';
      s.toolActivity = {};
      briefModel(`${where(id)}: the agent finished a turn. Result: ${txt}. (tools this turn: ${tools})`);
      return;
    }
    case 'goal_iteration':
      briefModel(`${where(id)}: goal iteration ${d.iteration}: ${d.satisfied ? 'satisfied' : 'not yet'}. ${d.feedback || ''}`);
      return;
    case 'goal_end':
      briefModel(`${where(id)}: goal loop ended: ${d.reason || ''}.`);
      return;
    case 'subagent_start': s.subagentsActive++; return;
    case 'subagent_end': s.subagentsActive = Math.max(0, s.subagentsActive - 1); return;
  }
}

function summarize(md) {
  let s = md.replace(/```[\s\S]*?```/g, ' [code] ')
            .replace(/`[^`]*`/g, '')
            .replace(/[#*_>|-]/g, ' ')
            .replace(/\s+/g, ' ')
            .trim();
  if (s.length > 240) s = s.slice(0, 240) + '…';
  return s || 'done';
}

// Render one history message to a compact spoken-friendly line.
function renderMsg(m) {
  const role = m.role || 'unknown';
  const text = (m.content || [])
    .filter(c => c.type === 'text' && c.text)
    .map(c => c.text).join(' ');
  if (role === 'tool_result') return null; // skip raw tool output in a spoken recap
  const who = role === 'assistant' ? 'agent' : (role === 'user' ? 'you' : role);
  const body = text ? summarize(text) : (role === 'assistant' ? '(tool calls)' : '');
  if (!body) return null;
  return `${who}: ${body}`;
}

function shortArgs(args) {
  try { const s = JSON.stringify(args); return s.length > 120 ? s.slice(0,120)+'…' : s; }
  catch { return ''; }
}

// ---------------------------------------------------------------------------
// Realtime tools (model -> moa actions), scoped to the ACTIVE session
// ---------------------------------------------------------------------------
function currentTools() {
  const a = activeSess();
  const tools = [
    { type: 'function', name: 'send_message_to_agent',
      description: 'Send a new instruction to the active moa session (or steer it if running).',
      parameters: { type: 'object', properties: {
        text: { type: 'string', description: 'The message, phrased as an instruction.' },
        verbatim: { type: 'string', description: "The user's literal words, for technical fidelity." },
      }, required: ['text'] } },
    { type: 'function', name: 'get_status',
      description: 'Get the state of the active session (what it is doing now).',
      parameters: { type: 'object', properties: {} } },
    { type: 'function', name: 'read_history',
      description: 'Read recent messages of the active session, newest first, paginated. Call with offset 0 for the most recent; increase offset to go further back if you still need context.',
      parameters: { type: 'object', properties: {
        count: { type: 'integer', description: 'How many messages to read (default 3, max 10).' },
        offset: { type: 'integer', description: 'How many messages back from the end to start (default 0 = most recent).' },
      } } },
    { type: 'function', name: 'list_sessions',
      description: 'List all sessions with their state and whether they need attention.',
      parameters: { type: 'object', properties: {} } },
    { type: 'function', name: 'switch_session',
      description: 'Make another session the active one. Match by title or partial title.',
      parameters: { type: 'object', properties: {
        query: { type: 'string', description: 'Title or partial title of the session to switch to.' },
      }, required: ['query'] } },
    { type: 'function', name: 'cancel_agent',
      description: 'Cancel the active session current run.',
      parameters: { type: 'object', properties: {} } },
  ];
  if (a && a.pendingAsk) {
    tools.push({ type: 'function', name: 'answer_agent_question',
      description: 'Answer the question the active session agent is asking.',
      parameters: { type: 'object', properties: {
        answers: { type: 'array', items: { type: 'string' }, description: 'One answer per question, in order.' },
      }, required: ['answers'] } });
  }
  if (a && a.pendingPerm) {
    tools.push({ type: 'function', name: 'resolve_permission',
      description: 'Approve or deny the permission the active session agent is requesting.',
      parameters: { type: 'object', properties: {
        approved: { type: 'boolean' },
        feedback: { type: 'string', description: 'Optional note when denying.' },
      }, required: ['approved'] } });
  }
  return tools;
}

function updateTools() {
  if (!dcReady) return;
  dc.send(JSON.stringify({ type: 'session.update', session: { tools: currentTools() } }));
}

async function runTool(name, args) {
  const a = activeSess();
  switch (name) {
    case 'send_message_to_agent': {
      if (!a) return { ok: false, error: 'no active session' };
      const text = args.verbatim ? `${args.text}\n\n(user said: "${args.verbatim}")` : args.text;
      const res = await api('POST', `/api/sessions/${a.id}/send`, { text });
      return { ok: true, action: res?.action || 'send', session: titleOf(a.id) };
    }
    case 'get_status':
      if (!a) return { ok: false, error: 'no active session' };
      return {
        session: titleOf(a.id), state: a.state, tools_this_turn: toolSummary(a),
        subagents_active: a.subagentsActive,
        pending_question: a.pendingAsk ? a.pendingAsk.questions.map(q=>q.question) : null,
        pending_permission: a.pendingPerm ? a.pendingPerm.toolName : null,
        last_agent_text: a.lastAgentText ? summarize(a.lastAgentText) : null,
      };
    case 'read_history': {
      if (!a) return { ok: false, error: 'no active session' };
      const total = a.history.length;
      const count = Math.min(Math.max(parseInt(args.count) || 3, 1), 10);
      const offset = Math.max(parseInt(args.offset) || 0, 0);
      // Newest-first window: end index counts back from the end by offset.
      const end = Math.max(total - offset, 0);
      const start = Math.max(end - count, 0);
      const slice = a.history.slice(start, end).reverse(); // newest first
      const messages = slice.map(renderMsg).filter(Boolean);
      return {
        session: titleOf(a.id),
        total_messages: total,
        returned: messages.length,
        offset, count,
        remaining_older: start, // how many older messages exist beyond this window
        messages,
      };
    }
    case 'list_sessions':
      return { active: activeId ? titleOf(activeId) : null,
        sessions: [...sessions.values()].map(s => ({
          title: titleOf(s.id), state: s.state,
          needs_attention: !!(s.pendingAsk || s.pendingPerm) || s.state === 'error',
        })) };
    case 'switch_session': {
      const q = (args.query || '').toLowerCase();
      const hit = [...sessions.values()].find(s => (titleOf(s.id)).toLowerCase().includes(q));
      if (!hit) return { ok: false, error: 'no session matches "' + args.query + '"' };
      setActive(hit.id, true);
      return { ok: true, active: titleOf(hit.id), state: hit.state };
    }
    case 'cancel_agent':
      if (!a) return { ok: false, error: 'no active session' };
      await api('POST', `/api/sessions/${a.id}/cancel`);
      return { ok: true };
    case 'answer_agent_question': {
      if (!a || !a.pendingAsk) return { ok: false, error: 'no pending question' };
      await api('POST', `/api/sessions/${a.id}/ask`, { id: a.pendingAsk.id, answers: args.answers });
      return { ok: true };
    }
    case 'resolve_permission': {
      if (!a || !a.pendingPerm) return { ok: false, error: 'no pending permission' };
      await api('POST', `/api/sessions/${a.id}/permission`,
        { id: a.pendingPerm.id, approved: !!args.approved, feedback: args.feedback || '' });
      return { ok: true };
    }
    default:
      return { ok: false, error: 'unknown tool' };
  }
}

// ---------------------------------------------------------------------------
// Realtime session setup
// ---------------------------------------------------------------------------
const INSTRUCTIONS = `You are a hands-free VOICE MEDIATOR between the user (speaking) and a coding agent called moa that runs on a server. The user may have several moa sessions (conversations) at once; one is "active" and your commands act on it.

Rules:
- You are NOT the coding agent. Never invent code, file contents, or technical answers. If unsure, call get_status or say you don't know.
- Events prefixed [MOA EVENT] are facts from a session. Relay the essential part naturally and briefly. Do not read code, paths or diffs aloud.
- Events may come from the current session or from ANOTHER one (the text says which). When a finished turn, question, or permission happens in another session, tell the user and OFFER to switch ("your other conversation X just finished / is asking Y — want to switch?"). Only switch when the user agrees, using switch_session. Don't switch on every little event.
- When the agent asks a question or requests permission, relay the essence and WAIT for the user's decision, then call answer_agent_question / resolve_permission.
- If the user asks what happened / to catch them up / about earlier messages, use read_history (offset 0 = latest). If you still lack context, call it again with a bigger offset to page further back. Don't dump everything; summarize.
- When the user gives an instruction for the agent, call send_message_to_agent. Pass their literal words in 'verbatim'.
- Be concise and conversational. Summarize routine activity; don't narrate every tool.
- Before destructive actions (cancel, approving a risky permission), confirm verbally first.
- Speak the user's language (Spanish or English, follow their lead).`;

function configureSession() {
  dc.send(JSON.stringify({
    type: 'session.update',
    session: { type: 'realtime', instructions: INSTRUCTIONS, tools: currentTools(), tool_choice: 'auto' },
  }));
}

// Half-duplex anti-echo (default): mute the mic while the model speaks so open
// speakers don't feed its own voice back in (echo loop). When barge-in is ON,
// the mic stays open so the user can interrupt (best with headphones).
function onModelSpeakingStart() {
  modelSpeaking = true;
  $('dot').className = 'dot speaking';
  if (micTrack && !userMuted && !bargeIn) micTrack.enabled = false;
}
function onModelSpeakingStop() {
  modelSpeaking = false;
  $('dot').className = 'dot live';
  if (micTrack && !userMuted) micTrack.enabled = true;
}

function handleRealtimeEvent(evt) {
  switch (evt.type) {
    case 'session.created': case 'session.updated': return;
    case 'output_audio_buffer.started': onModelSpeakingStart(); return;
    case 'output_audio_buffer.stopped':
    case 'output_audio_buffer.cleared': onModelSpeakingStop(); return;
    case 'response.output_audio_transcript.done':
      if (evt.transcript) log('agent', '🔊 ' + evt.transcript); return;
    case 'conversation.item.input_audio_transcription.completed':
      if (evt.transcript) log('you', '🗣️ ' + evt.transcript); return;
    case 'response.function_call_arguments.done': handleFunctionCall(evt); return;
    case 'error': log('err', 'realtime error: ' + JSON.stringify(evt.error || evt)); return;
  }
}

async function handleFunctionCall(evt) {
  let args = {};
  try { args = JSON.parse(evt.arguments || '{}'); } catch {}
  log('tool', `⚙️ ${evt.name}(${shortArgs(args)})`);
  let result;
  try { result = await runTool(evt.name, args); }
  catch (e) { result = { ok: false, error: String(e.message || e) }; log('err', `${evt.name} failed: ${e.message||e}`); }
  dc.send(JSON.stringify({
    type: 'conversation.item.create',
    item: { type: 'function_call_output', call_id: evt.call_id, output: JSON.stringify(result) },
  }));
  dc.send(JSON.stringify({ type: 'response.create' }));
}

// ---------------------------------------------------------------------------
// Connect / disconnect
// ---------------------------------------------------------------------------
async function connect() {
  await loadSessions();
  if (!sessions.size) { log('err', 'no sessions — create one in the main UI first'); return; }
  setStatus('connecting…');
  $('connect').disabled = true;

  try {
    const tok = await api('POST', '/api/realtime/token');
    const key = tok.value || (tok.client_secret && tok.client_secret.value);
    if (!key) throw new Error('no token value in response');

    pc = new RTCPeerConnection();
    const audioEl = document.createElement('audio');
    audioEl.autoplay = true;
    pc.ontrack = (e) => { audioEl.srcObject = e.streams[0]; };

    // echoCancellation/noiseSuppression help when using open speakers.
    const ms = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
    });
    micTrack = ms.getTracks()[0];
    pc.addTrack(micTrack);

    dc = pc.createDataChannel('oai-events');
    dc.onopen = () => {
      dcReady = true;
      configureSession();
      log('bridge', 'voice session ready — say hi 👋');
      const attn = [...sessions.values()].filter(s => s.pendingAsk || s.pendingPerm || s.state === 'error');
      let catchup = 'Say a short greeting and tell the user you are listening.';
      if (attn.length) catchup += ' Note: these sessions need attention: ' + attn.map(s => titleOf(s.id)).join(', ') + '.';
      briefModel(catchup);
    };
    dc.onmessage = (e) => handleRealtimeEvent(JSON.parse(e.data));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    const resp = await fetch('https://api.openai.com/v1/realtime/calls', {
      method: 'POST', body: offer.sdp,
      headers: { Authorization: `Bearer ${key}`, 'Content-Type': 'application/sdp' },
    });
    if (!resp.ok) throw new Error('OpenAI SDP exchange failed: ' + resp.status);
    await pc.setRemoteDescription({ type: 'answer', sdp: await resp.text() });

    connectAllBuses();

    $('dot').className = 'dot live';
    setStatus('live · ' + sessions.size + ' session(s)');
    $('disconnect').disabled = false;
    $('mute').disabled = false;
  } catch (e) {
    log('err', 'connect failed: ' + (e.message || e));
    setStatus('error');
    $('connect').disabled = false;
    disconnect();
  }
}

function disconnect() {
  dcReady = false;
  closeAllBuses();
  if (dc) { dc.close(); dc = null; }
  if (micTrack) { micTrack.stop(); micTrack = null; }
  if (pc) { pc.close(); pc = null; }
  userMuted = false; modelSpeaking = false;
  $('dot').className = 'dot';
  setStatus('idle');
  $('connect').disabled = false;
  $('disconnect').disabled = true;
  $('mute').disabled = true;
  $('mute').textContent = 'Mute mic';
}

function toggleMute() {
  if (!micTrack) return;
  userMuted = !userMuted;
  // When muted, force off. When unmuted, only enable if the model isn't speaking.
  micTrack.enabled = userMuted ? false : !modelSpeaking;
  $('mute').textContent = userMuted ? 'Unmute mic' : 'Mute mic';
  log('bridge', userMuted ? 'mic muted' : 'mic on');
}

$('connect').onclick = connect;
$('disconnect').onclick = disconnect;
$('mute').onclick = toggleMute;

// Barge-in toggle (persisted). When turned OFF mid-speech, re-apply half-duplex
// immediately so the mic mutes if the model is currently talking.
const bargeEl = $('bargein');
bargeEl.checked = bargeIn;
bargeEl.onchange = () => {
  bargeIn = bargeEl.checked;
  localStorage.setItem('moa_voice_bargein', bargeIn ? '1' : '0');
  if (micTrack && !userMuted) micTrack.enabled = bargeIn ? true : !modelSpeaking;
  log('bridge', 'barge-in ' + (bargeIn ? 'on (you can interrupt)' : 'off (half-duplex, echo-safe)'));
};

loadSessions();
</script>
</body>
</html>
